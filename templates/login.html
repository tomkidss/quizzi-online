<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Đăng nhập Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-dark text-light">
<div class="container py-5" style="max-width:420px;">
  <h3 class="mb-1">Đăng nhập Control</h3>
  <p class="text-bright-hint mb-4">Chỉ Ban tổ chức mới được truy cập màn điều khiển.</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-warning">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  <div class="card bg-black border-secondary">
    <div class="card-body">
      <form method="post" action="/login?next={{ next }}">
        <div class="mb-2">
          <label class="form-label text-bright-hint">Username</label>
          <input class="form-control form-control-lg" name="username" autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label text-bright-hint">Password</label>
          <input class="form-control form-control-lg" name="password" type="password" autocomplete="current-password">
        </div>
        <button class="btn btn-success w-100 btn-lg">ĐĂNG NHẬP</button>
      </form>

      <div class="mt-3 small text-bright-hint">
        Gợi ý: anh có thể đổi mật khẩu bằng biến môi trường <b>QUIZ_ADMIN_PASS</b>.
      </div>
    </div>
  </div>
</div>
{% include "_footer.html" %}

</body>
</html>
