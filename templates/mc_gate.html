<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <title>Nhập code MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-dark text-light">
  <div class="container py-5" style="max-width:700px;">
    <h3 class="mb-1">Màn hình MC</h3>
    <p class="text-bright-hint mb-4">
      Nhập <b>ROOM</b> và <b>MC code</b> (dùng chung <b>Display code</b>) do BTC cung cấp để vào màn hình MC.
    </p>

    <div class="row g-4 align-items-center">
      <div class="col-12 col-md-7">
        <div class="card bg-black border-secondary h-100">
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label text-bright-hint">ROOM</label>
              <input id="room" class="form-control form-control-lg text-uppercase" placeholder="VD: A9F2QX" autofocus>
            </div>

            <div class="mb-3">
              <label class="form-label text-bright-hint">MC code</label>
              <input id="code" class="form-control form-control-lg" placeholder="VD: 9999">
            </div>

            <button id="btnGo" class="btn btn-success w-100 btn-lg">VÀO MÀN HÌNH</button>

            <div id="msg" class="mt-3 small text-bright-hint"></div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-5 text-center">
        <div
          class="card bg-black border-secondary h-100 d-flex flex-column justify-content-center align-items-center p-3">
          <h6 class="text-bright-hint mb-3">Quét QR để vào nhanh</h6>
          <img id="qrImage" src="" alt="Mã QR" class="img-fluid rounded bg-white p-2 d-none" style="max-width: 150px;">
          <div id="qrPlaceholder" class="text-secondary small mt-2">
            Nhập ROOM để sinh mã QR
          </div>
        </div>
      </div>
    </div>

    <div class="mt-3 small text-bright-hint">
      Gợi ý: MC code dùng chung Display code để khỏi phải sinh thêm mã.
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // Prefill room if passed
    const params = new URLSearchParams(window.location.search);
    const roomFromUrl = (params.get("room") || "").trim().toUpperCase();
    if (roomFromUrl) $("room").value = roomFromUrl;

    // Remember last
    try {
      const savedRoom = localStorage.getItem("quiz_mc_room") || "";
      if (!roomFromUrl && savedRoom) $("room").value = savedRoom;
    } catch (e) { }

    function updateQR() {
      const room = ($("room").value || "").trim().toUpperCase();
      if (room) {
        $("qrImage").src = `/mc_qr/${encodeURIComponent(room)}.png`;
        $("qrImage").classList.remove("d-none");
        $("qrPlaceholder").classList.add("d-none");
      } else {
        $("qrImage").classList.add("d-none");
        $("qrPlaceholder").classList.remove("d-none");
      }
    }

    // Update on load & input
    updateQR();
    $("room").addEventListener("input", updateQR);

    $("btnGo").addEventListener("click", () => {
      const room = ($("room").value || "").trim().toUpperCase();
      const code = ($("code").value || "").trim();

      if (!room) {
        $("msg").textContent = "Vui lòng nhập ROOM.";
        return;
      }
      if (!code) {
        $("msg").textContent = "Vui lòng nhập MC code.";
        return;
      }

      try {
        localStorage.setItem("quiz_mc_room", room);
        localStorage.setItem("quiz_mc_code", code);
      } catch (e) { }

      window.location.href = `/mc?room=${encodeURIComponent(room)}`;
    });
  </script>

  {% include "_footer.html" %}

</body>

</html>
